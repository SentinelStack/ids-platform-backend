name: IDS Platform Backend CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-test:
    name: Build and Verify Backend Against QA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Create Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>nexus-releases</id>
                <username>${NEXUS_USERNAME}</username>
                <password>${NEXUS_PASSWORD}</password>
              </server>
              <server>
                <id>nexus-snapshots</id>
                <username>${NEXUS_USERNAME}</username>
                <password>${NEXUS_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

      - name: Show dependency tree
        run: mvn -B dependency:tree

      - name: Build project
        run: mvn -B clean test

      - name: Verify QA ping endpoint
        run: |
          response=$(curl -fsS https://qa-api.puk3p.online/test/ping)
          echo "Ping response: $response"
          test "$response" = "pong"

      - name: Verify QA bundled contract endpoint
        run: |
          curl -fsS https://qa-api.puk3p.online/test/contract/bundled > contract-response.txt
          cat contract-response.txt
          grep -q "openapi:" contract-response.txt

      - name: Checkout CATS source
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          repository: Endava/cats
          path: tools/cats-src

      - name: Setup JDK for CATS
        if: github.event_name == 'push'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Prepare CATS Maven wrapper
        if: github.event_name == 'push'
        working-directory: tools/cats-src
        run: |
          chmod +x mvnw

      - name: Clean CATS workspace
        if: github.event_name == 'push'
        working-directory: tools/cats-src
        run: |
          ./mvnw clean

      - name: Build CATS uberjar
        if: github.event_name == 'push'
        working-directory: tools/cats-src
        run: |
          ./mvnw package -Dquarkus.package.type=uber-jar

      - name: Run CATS against QA
        if: github.event_name == 'push'
        run: |
          mkdir -p cats-report
          java -jar tools/cats-src/target/cats-runner.jar \
            --contract=https://qa-api.puk3p.online/test/contract/bundled \
            --server=https://qa-api.puk3p.online \
            --blackbox \
            --reportFormat=HTML_ONLY \
            --output=cats-report \
            --timestampReports \
            --skipReportingForIgnored \
            --verbosity=SUMMARY > cats-output.log 2>&1

      - name: Upload CATS report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cats-report
          path: cats-report
          if-no-files-found: ignore

      - name: Upload contract response
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-contract-response
          path: contract-response.txt
          if-no-files-found: ignore

      - name: Upload CATS output log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cats-output-log
          path: cats-output.log
          if-no-files-found: ignore

      - name: Prepare Pages artifact
        if: github.event_name == 'push'
        run: |
          mkdir -p pages
          REPORT_DIR=$(find cats-report -type f -name "index.html" -exec dirname {} \; | head -n 1)
          echo "Using report directory: $REPORT_DIR"
          cp -r "$REPORT_DIR"/* pages/

      - name: Configure Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy-pages:
    name: Deploy CATS Report to GitHub Pages
    if: github.event_name == 'push'
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4