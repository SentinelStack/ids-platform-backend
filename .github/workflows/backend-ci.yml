name: IDS Platform Backend CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy_qa:
        description: "Deploy current commit to QA"
        required: true
        default: false
        type: boolean
      run_cats:
        description: "Run CATS after QA deploy"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  quality-gates:
    name: Build, Test and Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Create Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>nexus-releases</id>
                <username>${NEXUS_USERNAME}</username>
                <password>${NEXUS_PASSWORD}</password>
              </server>
              <server>
                <id>nexus-snapshots</id>
                <username>${NEXUS_USERNAME}</username>
                <password>${NEXUS_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

      - name: Build and run tests
        run: mvn -B clean test

      - name: Run Checkstyle
        run: mvn -B -DskipTests checkstyle:check

      - name: Run PMD
        run: mvn -B -DskipTests pmd:check

      - name: Run SpotBugs
        run: mvn -B -DskipTests spotbugs:check

      - name: Package application
        run: mvn -B -DskipTests package

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/*.jar
          if-no-files-found: error

  deploy-nexus:
    name: Deploy Artifact to Nexus
    if: github.event_name == 'push'
    needs: quality-gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Create Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>nexus-releases</id>
                <username>${NEXUS_USERNAME}</username>
                <password>${NEXUS_PASSWORD}</password>
              </server>
              <server>
                <id>nexus-snapshots</id>
                <username>${NEXUS_USERNAME}</username>
                <password>${NEXUS_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

      - name: Deploy to Nexus
        run: mvn -B -DskipTests deploy

  deploy-qa:
    name: Manual Deploy to QA
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_qa == 'true'
    needs: quality-gates
    runs-on: ubuntu-latest
    environment:
      name: qa

    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v4

      - name: Download built jar
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: target

      - name: Validate QA deploy secrets
        run: |
          test -n "${QA_SSH_HOST}" || (echo "Missing QA_SSH_HOST secret" && exit 1)
          test -n "${QA_SSH_USER}" || (echo "Missing QA_SSH_USER secret" && exit 1)
          test -n "${QA_SSH_PRIVATE_KEY}" || (echo "Missing QA_SSH_PRIVATE_KEY secret" && exit 1)
        env:
          QA_SSH_HOST: ${{ secrets.QA_SSH_HOST }}
          QA_SSH_USER: ${{ secrets.QA_SSH_USER }}
          QA_SSH_PRIVATE_KEY: ${{ secrets.QA_SSH_PRIVATE_KEY }}

      - name: Deploy jar to QA over SSH
        env:
          QA_SSH_HOST: ${{ secrets.QA_SSH_HOST }}
          QA_SSH_USER: ${{ secrets.QA_SSH_USER }}
          QA_SSH_PRIVATE_KEY: ${{ secrets.QA_SSH_PRIVATE_KEY }}
          QA_SSH_PORT: ${{ secrets.QA_SSH_PORT }}
          QA_DEPLOY_PATH: ${{ vars.QA_DEPLOY_PATH }}
          QA_SERVICE_NAME: ${{ vars.QA_SERVICE_NAME }}
        run: |
          DEPLOY_PATH="${QA_DEPLOY_PATH:-/opt/ids-platform-backend}"
          SERVICE_NAME="${QA_SERVICE_NAME:-ids-platform-backend}"
          PORT="${QA_SSH_PORT:-22}"
          JAR_FILE=$(find target -maxdepth 1 -name "*.jar" | head -n 1)

          test -n "$JAR_FILE" || (echo "No jar found in target/" && exit 1)

          mkdir -p ~/.ssh
          echo "${QA_SSH_PRIVATE_KEY}" > ~/.ssh/qa_key
          chmod 600 ~/.ssh/qa_key
          ssh-keyscan -p "$PORT" -H "$QA_SSH_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/qa_key -p "$PORT" "${QA_SSH_USER}@${QA_SSH_HOST}" "mkdir -p ${DEPLOY_PATH}"
          scp -i ~/.ssh/qa_key -P "$PORT" "$JAR_FILE" "${QA_SSH_USER}@${QA_SSH_HOST}:${DEPLOY_PATH}/app.jar"
          ssh -i ~/.ssh/qa_key -p "$PORT" "${QA_SSH_USER}@${QA_SSH_HOST}" \
            "sudo systemctl restart ${SERVICE_NAME} && sudo systemctl status ${SERVICE_NAME} --no-pager"

  qa-smoke-tests:
    name: QA Smoke Tests
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_qa == 'true'
    needs: deploy-qa
    runs-on: ubuntu-latest

    steps:
      - name: Verify QA ping endpoint
        run: |
          response=$(curl -fsS https://qa-api.puk3p.online/test/ping)
          echo "Ping response: $response"
          test "$response" = "pong"

      - name: Verify QA bundled contract endpoint
        run: |
          curl -fsS https://qa-api.puk3p.online/test/contract/bundled > contract-response.txt
          cat contract-response.txt
          grep -q "openapi:" contract-response.txt

      - name: Upload contract response
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-contract-response
          path: contract-response.txt
          if-no-files-found: ignore

  cats-report:
    name: Manual Run CATS Against QA
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_qa == 'true' && github.event.inputs.run_cats == 'true'
    needs: qa-smoke-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v4

      - name: Checkout CATS source
        uses: actions/checkout@v4
        with:
          repository: Endava/cats
          path: tools/cats-src

      - name: Setup JDK for CATS
        id: setup-java-cats
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Verify Java toolchain for CATS
        run: |
          echo "JAVA_HOME from setup-java: ${{ steps.setup-java-cats.outputs.path }}"
          echo "JAVA_HOME before export: $JAVA_HOME"
          export JAVA_HOME="${{ steps.setup-java-cats.outputs.path }}"
          export PATH="$JAVA_HOME/bin:$PATH"
          echo "JAVA_HOME after export: $JAVA_HOME"
          which java
          java -version
          which javac
          javac -version
          tools/cats-src/mvnw -version

      - name: Prepare CATS Maven wrapper
        working-directory: tools/cats-src
        run: chmod +x mvnw

      - name: Clean CATS workspace
        working-directory: tools/cats-src
        run: ./mvnw clean

      - name: Build CATS uberjar
        working-directory: tools/cats-src
        env:
          JAVA_HOME: ${{ steps.setup-java-cats.outputs.path }}
        run: |
          set -euo pipefail
          export PATH="$JAVA_HOME/bin:$PATH"
          JAVA_VERSION_OUTPUT="$(javac -version 2>&1)"
          JAVA_VERSION="${JAVA_VERSION_OUTPUT#javac }"
          JAVA_MAJOR="${JAVA_VERSION%%.*}"
          if [ "$JAVA_MAJOR" -ge 25 ]; then
            ./mvnw package -Dquarkus.package.type=uber-jar
          else
            echo "JDK $JAVA_MAJOR detected, using compiler release 21 fallback for CATS build"
            ./mvnw package -Dquarkus.package.type=uber-jar -Dmaven.compiler.release=21
          fi

      - name: Run CATS against QA
        run: |
          mkdir -p cats-report
          java -jar tools/cats-src/target/cats-runner.jar \
            --contract=https://qa-api.puk3p.online/test/contract/bundled \
            --server=https://qa-api.puk3p.online \
            --blackbox \
            --reportFormat=HTML_ONLY \
            --output=cats-report \
            --timestampReports \
            --skipReportingForIgnored \
            --verbosity=SUMMARY > cats-output.log 2>&1

      - name: Upload CATS report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cats-report
          path: cats-report
          if-no-files-found: ignore

      - name: Upload CATS output log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cats-output-log
          path: cats-output.log
          if-no-files-found: ignore

      - name: Prepare Pages artifact
        run: |
          mkdir -p pages
          REPORT_DIR=$(find cats-report -type f -name "index.html" -exec dirname {} \; | head -n 1)
          test -n "$REPORT_DIR" || (echo "No CATS report directory found" && exit 1)
          cp -r "$REPORT_DIR"/* pages/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy-pages:
    name: Deploy CATS Report to GitHub Pages
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_qa == 'true' && github.event.inputs.run_cats == 'true'
    needs: cats-report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
